<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Lab</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:   #f5f0e8;
    --paper:   #fdf9f0;
    --ink:     #2a2520;
    --ink-mid: #6b6158;
    --ink-faint:#b8a898;
    --border:  #c8b89a;
    --border-light: #e0d4be;
    --accent:  #d35400;
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100%;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
    max-width: 960px;
    margin: 0 auto;
  }

  .site-logo {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .site-title h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1;
  }

  .site-title p {
    font-size: 12px;
    color: var(--ink-mid);
    margin-top: 4px;
  }

  nav {
    margin-left: auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  nav a {
    font-size: 12px;
    color: var(--ink-mid);
    text-decoration: none;
    padding: 5px 10px;
    border: 1px solid var(--border-light);
    border-radius: 4px;
    background: var(--paper);
    transition: border-color 0.15s;
  }
  nav a:hover { border-color: var(--border); color: var(--ink); }

  /* ── Language switcher ── */
  .lang-switcher {
    display: flex;
    gap: 2px;
    border: 1px solid var(--border-light);
    border-radius: 4px;
    overflow: hidden;
    background: var(--paper);
  }

  .lang-btn {
    padding: 5px 9px;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: background 0.12s, color 0.12s;
  }
  .lang-btn:hover { background: var(--cream); color: var(--ink); }
  .lang-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* ── Main ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  /* ── Game Grid ── */
  #game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .game-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .game-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--cream);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-body {
    padding: 12px 14px 14px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.5;
  }

  .card-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 10px;
    color: var(--ink-faint);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 1px 6px;
  }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px 0;
    color: var(--ink-faint);
  }
  .empty-state svg { margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }

  /* ── Loading ── */
  #loading {
    text-align: center;
    padding: 64px 0;
    color: var(--ink-faint);
    font-size: 13px;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border-light);
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--ink-faint);
  }
</style>
</head>
<body>

<header>
  <svg class="site-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="4" width="40" height="40" rx="8" fill="#fdf9f0" stroke="#c8b89a" stroke-width="1.5"/>
    <rect x="10" y="28" width="10" height="12" rx="1.5" fill="#f5f0e8" stroke="#b8a898" stroke-width="1.2"/>
    <rect x="22" y="20" width="10" height="20" rx="1.5" fill="#f5f0e8" stroke="#b8a898" stroke-width="1.2"/>
    <rect x="34" y="12" width="10" height="28" rx="1.5" fill="#f5f0e8" stroke="#b8a898" stroke-width="1.2"/>
    <line x1="8" y1="40" x2="40" y2="40" stroke="#c8b89a" stroke-width="1"/>
  </svg>
  <div class="site-title">
    <h1>Mini Game Lab</h1>
    <p id="tagline"></p>
  </div>
  <nav>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">ZH</button>
      <button class="lang-btn" data-lang="vi" onclick="setLang('vi')">VI</button>
    </div>
    <a href="admin.html" id="nav-admin"></a>
  </nav>
</header>

<main>
  <div class="section-label" id="section-all"></div>
  <div id="loading"></div>
  <div id="game-grid" style="display:none"></div>
</main>

<footer id="footer-text"></footer>

<script>
  // ── Translations ──────────────────────────────────────────
  const T = {
    en: {
      tagline:     'A collection of small game mechanics by Zu and Helen',
      sectionAll:  'All games',
      loading:     'Loading…',
      loadError:   'Could not load games.json.',
      empty:       'No games yet. Go to Admin to add one.',
      admin:       '⚙ Admin',
      footer:      'Mini Game Lab · GitHub Pages',
    },
    vi: {
      tagline:     'Bộ sưu tập game cơ chế nhỏ by Zu and Helen',
      sectionAll:  'Tất cả game',
      loading:     'Đang tải…',
      loadError:   'Không tải được games.json.',
      empty:       'Chưa có game nào. Vào Admin để thêm.',
      admin:       '⚙ Admin',
      footer:      'Mini Game Lab · GitHub Pages',
    },
    zh: {
      tagline:     '小游戏机制合集 by Zu and Helen',
      sectionAll:  '全部游戏',
      loading:     '加载中…',
      loadError:   '无法加载 games.json。',
      empty:       '暂无游戏。请前往 Admin 添加。',
      admin:       '⚙ 管理',
      footer:      'Mini Game Lab · GitHub Pages',
    },
  };

  const LANG_KEY = 'mgl_lang';
  let currentLang = localStorage.getItem(LANG_KEY) || 'en';
  let cachedGames = [];

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);
    applyLang();
    if (cachedGames.length) renderGames(cachedGames);
  }

  function applyLang() {
    const t = T[currentLang];
    document.documentElement.lang = currentLang;
    document.getElementById('tagline').textContent      = t.tagline;
    document.getElementById('section-all').textContent  = t.sectionAll;
    document.getElementById('nav-admin').textContent    = t.admin;
    document.getElementById('footer-text').textContent  = t.footer;

    // Active button
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
  }

  // ── Games ─────────────────────────────────────────────────
  const GAMES_JSON = 'games.json';

  async function loadGames() {
    document.getElementById('loading').textContent = T[currentLang].loading;
    try {
      const res = await fetch(GAMES_JSON + '?v=' + Date.now());
      if (!res.ok) throw new Error('not found');
      cachedGames = await res.json();
      renderGames(cachedGames);
    } catch(e) {
      document.getElementById('loading').textContent = T[currentLang].loadError;
    }
  }

  function renderGames(games) {
    const grid    = document.getElementById('game-grid');
    const loading = document.getElementById('loading');
    loading.style.display = 'none';
    grid.style.display = 'grid';

    if (!games.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="6" y="6" width="28" height="28" rx="4" stroke="#b8a898" stroke-width="1.5" stroke-dasharray="4 2"/>
            <line x1="14" y1="20" x2="26" y2="20" stroke="#b8a898" stroke-width="1.5"/>
            <line x1="20" y1="14" x2="20" y2="26" stroke="#b8a898" stroke-width="1.5"/>
          </svg>
          <p>${T[currentLang].empty}</p>
        </div>`;
      return;
    }

    grid.innerHTML = games.map(g => {
      // Pick description by lang, fallback to default description
      const desc = g['description_' + currentLang] || g.description || '';
      return `
        <a class="game-card" href="${g.path}" target="_blank">
          <div class="card-thumb">
            ${g.thumb
              ? `<img src="${g.thumb}" style="width:100%;height:100%;object-fit:cover;" alt="${g.title}">`
              : renderPlaceholder(g)
            }
          </div>
          <div class="card-body">
            <div class="card-title">${g.title}</div>
            <div class="card-desc">${desc}</div>
            ${g.mechanic ? `<span class="card-tag">${g.mechanic}</span>` : ''}
          </div>
        </a>`;
    }).join('');
  }

  function renderPlaceholder(g) {
    const initials = g.title.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    return `
      <div class="card-thumb-placeholder">
        <svg viewBox="0 0 120 90" width="120" height="90" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="90" fill="#f5f0e8"/>
          <line x1="0" y1="30" x2="120" y2="30" stroke="#e0d4be" stroke-width="0.7"/>
          <line x1="0" y1="60" x2="120" y2="60" stroke="#e0d4be" stroke-width="0.7"/>
          <line x1="40" y1="0" x2="40" y2="90" stroke="#e0d4be" stroke-width="0.7"/>
          <line x1="80" y1="0" x2="80" y2="90" stroke="#e0d4be" stroke-width="0.7"/>
          <text x="60" y="52" text-anchor="middle" font-family="system-ui" font-size="26"
                font-weight="700" fill="#c8b89a">${initials}</text>
        </svg>
      </div>`;
  }

  // ── Boot ──────────────────────────────────────────────────
  applyLang();
  loadGames();
</script>
</body>
</html>
