<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Lab</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:        #f5f0e8;
    --paper:        #fdf9f0;
    --ink:          #2a2520;
    --ink-mid:      #6b6158;
    --ink-faint:    #b8a898;
    --border:       #c8b89a;
    --border-light: #e0d4be;
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100%;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 960px;
    margin: 0 auto;
  }

  .site-logo {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
  }

  .site-title {
    flex: 1;
    min-width: 0;
  }

  .site-title h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 1.1;
    white-space: nowrap;
  }

  .site-title p {
    font-size: 11px;
    color: var(--ink-mid);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  nav {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  /* Language switcher */
  .lang-switcher {
    display: flex;
    gap: 0;
    border: 1px solid var(--border-light);
    border-radius: 5px;
    overflow: hidden;
    background: var(--paper);
  }

  .lang-btn {
    padding: 5px 8px;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: background 0.12s, color 0.12s;
  }
  .lang-btn:hover { background: var(--cream); color: var(--ink); }
  .lang-btn.active { background: var(--ink); color: var(--paper); }

  /* Admin gear button */
  .admin-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border: 1px solid var(--border-light);
    border-radius: 5px;
    background: var(--paper);
    text-decoration: none;
    color: var(--ink-mid);
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .admin-btn:hover { border-color: var(--border); color: var(--ink); }

  /* ── Main ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 64px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  /* ── Game Grid ── */
  #game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .game-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .game-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--cream);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-body { padding: 11px 13px 13px; }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.5;
  }

  .card-tag {
    display: inline-block;
    margin-top: 7px;
    font-size: 10px;
    color: var(--ink-faint);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 1px 6px;
  }

  /* ── Empty / Loading ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px 0;
    color: var(--ink-faint);
  }
  .empty-state svg { margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }

  #loading {
    text-align: center;
    padding: 64px 0;
    color: var(--ink-faint);
    font-size: 13px;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border-light);
    text-align: center;
    padding: 18px;
    font-size: 11px;
    color: var(--ink-faint);
  }
</style>
</head>
<body>

<header>
  <!-- Gamepad icon logo -->
  <svg class="site-logo" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="32" height="32" rx="7" fill="#fdf9f0" stroke="#c8b89a" stroke-width="1.2"/>
    <!-- controller body -->
    <path d="M7 14 Q7 11 10 11 L24 11 Q27 11 27 14 L26 22 Q25.5 24 23 24 L21 24 Q20 22 17 22 Q14 22 13 24 L11 24 Q8.5 24 8 22 Z" fill="#f5f0e8" stroke="#c8b89a" stroke-width="1.1" stroke-linejoin="round"/>
    <!-- d-pad vertical -->
    <rect x="10.5" y="14.5" width="2.5" height="5.5" rx="0.6" fill="#c8b89a"/>
    <!-- d-pad horizontal -->
    <rect x="9" y="16" width="5.5" height="2.5" rx="0.6" fill="#c8b89a"/>
    <!-- buttons -->
    <circle cx="22" cy="15.5" r="1.1" fill="#c8b89a"/>
    <circle cx="24.2" cy="17.5" r="1.1" fill="#c8b89a"/>
    <circle cx="22" cy="19.5" r="1.1" fill="#c8b89a"/>
    <circle cx="19.8" cy="17.5" r="1.1" fill="#c8b89a"/>
  </svg>

  <div class="site-title">
    <h1>Mini Game Lab</h1>
    <p id="tagline"></p>
  </div>

  <nav>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">ZH</button>
      <button class="lang-btn" data-lang="vi" onclick="setLang('vi')">VI</button>
    </div>
    <!-- Admin: gear icon only -->
    <a href="admin.html" class="admin-btn" title="Admin">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M7.5 9.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.6 2.6l1.1 1.1M11.3 11.3l1.1 1.1M11.3 3.7l-1.1 1.1M3.8 11.2l-1.1 1.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </a>
  </nav>
</header>

<main>
  <div class="section-label" id="section-all"></div>
  <div id="loading"></div>
  <div id="game-grid" style="display:none"></div>
</main>

<footer id="footer-text"></footer>

<script>
  const T = {
    en: {
      tagline:    'A collection of small game mechanics by Zu and Helen',
      sectionAll: 'All games',
      loading:    'Loading…',
      loadError:  'Could not load games.json.',
      empty:      'No games yet. Go to Admin to add one.',
      footer:     'Mini Game Lab · GitHub Pages',
    },
    vi: {
      tagline:    'Bộ sưu tập game cơ chế nhỏ by Zu and Helen',
      sectionAll: 'Tất cả game',
      loading:    'Đang tải…',
      loadError:  'Không tải được games.json.',
      empty:      'Chưa có game nào. Vào Admin để thêm.',
      footer:     'Mini Game Lab · GitHub Pages',
    },
    zh: {
      tagline:    '小游戏机制合集 by Zu and Helen',
      sectionAll: '全部游戏',
      loading:    '加载中…',
      loadError:  '无法加载 games.json。',
      empty:      '暂无游戏。请前往 Admin 添加。',
      footer:     'Mini Game Lab · GitHub Pages',
    },
  };

  const LANG_KEY = 'mgl_lang';
  let currentLang = localStorage.getItem(LANG_KEY) || 'en';
  let cachedGames = [];

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);
    applyLang();
    if (cachedGames.length) renderGames(cachedGames);
  }

  function applyLang() {
    const t = T[currentLang];
    document.documentElement.lang = currentLang;
    document.getElementById('tagline').textContent     = t.tagline;
    document.getElementById('section-all').textContent = t.sectionAll;
    document.getElementById('footer-text').textContent = t.footer;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
  }

  async function loadGames() {
    document.getElementById('loading').textContent = T[currentLang].loading;
    try {
      const res = await fetch('games.json?v=' + Date.now());
      if (!res.ok) throw new Error('not found');
      cachedGames = await res.json();
      renderGames(cachedGames);
    } catch(e) {
      document.getElementById('loading').textContent = T[currentLang].loadError;
    }
  }

  function renderGames(games) {
    const grid    = document.getElementById('game-grid');
    const loading = document.getElementById('loading');
    loading.style.display = 'none';
    grid.style.display = 'grid';

    if (!games.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="6" y="6" width="28" height="28" rx="4" stroke="#b8a898" stroke-width="1.5" stroke-dasharray="4 2"/>
            <line x1="14" y1="20" x2="26" y2="20" stroke="#b8a898" stroke-width="1.5"/>
            <line x1="20" y1="14" x2="20" y2="26" stroke="#b8a898" stroke-width="1.5"/>
          </svg>
          <p>${T[currentLang].empty}</p>
        </div>`;
      return;
    }

    grid.innerHTML = games.map(g => {
      const desc = g['description_' + currentLang] || g.description || '';
      return `
        <a class="game-card" href="${g.path}" target="_blank">
          <div class="card-thumb">
            ${g.thumb
              ? `<img src="${g.thumb}" style="width:100%;height:100%;object-fit:cover;" alt="${g.title}">`
              : renderPlaceholder(g)
            }
          </div>
          <div class="card-body">
            <div class="card-title">${g.title}</div>
            <div class="card-desc">${desc}</div>
            ${g.mechanic ? `<span class="card-tag">${g.mechanic}</span>` : ''}
          </div>
        </a>`;
    }).join('');
  }

  function renderPlaceholder(g) {
    const initials = g.title.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    return `
      <div class="card-thumb-placeholder">
        <svg viewBox="0 0 120 90" width="120" height="90" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="90" fill="#f5f0e8"/>
          <line x1="0" y1="30" x2="120" y2="30" stroke="#e0d4be" stroke-width="0.7"/>
          <line x1="0" y1="60" x2="120" y2="60" stroke="#e0d4be" stroke-width="0.7"/>
          <line x1="40" y1="0" x2="40" y2="90" stroke="#e0d4be" stroke-width="0.7"/>
          <line x1="80" y1="0" x2="80" y2="90" stroke="#e0d4be" stroke-width="0.7"/>
          <text x="60" y="52" text-anchor="middle" font-family="system-ui" font-size="26"
                font-weight="700" fill="#c8b89a">${initials}</text>
        </svg>
      </div>`;
  }

  applyLang();
  loadGames();
</script>
</body>
</html>
